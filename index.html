<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Karaoke Wheel</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>🎤 Karaoke Wheel</h1>
      <p class="subtitle">Gira la ruota e scegli la canzone</p>
    </header>

    <!-- INPUT SECTION -->
    <section class="section">
      <h2>Partecipanti</h2>
      <div class="input-row">
        <input type="text" id="nameInput" placeholder="Nome partecipante" maxlength="20">
        <button class="btn btn-primary" id="addNameBtn">Aggiungi</button>
      </div>
      <div class="tags" id="participantsList"></div>
      <button class="btn btn-text btn-danger" id="clearAllParticipantsBtn" style="display:none;">Elimina tutti</button>
    </section>

    <!-- SONG SECTION -->
    <section class="section">
      <h2>Canzoni</h2>
      
      <div class="tabs">
        <button class="tab active" id="csvModeBtn" onclick="setSongMode('csv')">CSV</button>
        <button class="tab" id="manualModeBtn" onclick="setSongMode('manual')">Manuale</button>
      </div>

      <div id="csvModeSection">
        <label for="csvFile" class="file-upload">
          <span>📁 Carica file CSV</span>
        </label>
        <input type="file" id="csvFile" accept=".csv">
        <label class="checkbox">
          <input type="checkbox" id="appendCsv" checked>
          <span>Aggiungi alle esistenti</span>
        </label>
      </div>

      <div id="manualModeSection" style="display: none;">
        <div class="input-row">
          <input type="text" id="songInput" placeholder="Titolo canzone" maxlength="50">
          <button class="btn btn-primary" id="addSongBtn">Aggiungi</button>
        </div>
      </div>
      
      <div class="song-list-box">
        <div class="list-header">
          <span>Canzoni caricate</span>
          <span class="count" id="songCount">0</span>
        </div>
        <div class="song-list" id="songList">
          <p class="empty">Nessuna canzone</p>
        </div>
      </div>
      
      <button class="btn btn-text btn-danger" id="clearAllSongsBtn" style="display:none;">Elimina tutte</button>
    </section>

    <!-- STATS -->
    <div class="stats">
      <div class="stat">
        <span class="stat-num" id="totalParts">0</span>
        <span class="stat-label">Partecipanti</span>
      </div>
      <div class="stat">
        <span class="stat-num" id="totalSongs">0</span>
        <span class="stat-label">Canzoni</span>
      </div>
      <div class="stat">
        <span class="stat-num" id="availableSongs">0</span>
        <span class="stat-label">Disponibili</span>
      </div>
    </div>

    <!-- WHEEL -->
    <section class="section wheel-section">
      <div class="wheel-wrapper">
        <svg id="wheelSvg" viewBox="0 0 400 400"></svg>
        <div class="arrow"></div>
      </div>
      <div class="wheel-actions">
        <button class="btn btn-primary btn-lg" id="spinBtn" disabled>Gira la Ruota</button>
        <button class="btn btn-success btn-lg" id="showSongsBtn" style="display:none;">Vedi Canzoni</button>
        <button class="btn btn-outline" id="resetBtn">Reset</button>
      </div>
    </section>

    <!-- CARD MODE -->
    <section class="section" id="cardModeSelection" style="display: none;">
      <h2 id="cardModePlayer"></h2>
      <div class="mode-options">
        <button class="option-card" onclick="selectCardMode('single')">
          <span class="option-icon">🎵</span>
          <span>Una canzone</span>
        </button>
        <button class="option-card" onclick="selectCardMode('five')">
          <span class="option-icon">🃏</span>
          <span>Cinque carte</span>
        </button>
      </div>
    </section>

    <!-- SINGLE CARD -->
    <section class="section" id="singleCardSection" style="display: none;">
      <h2 id="currentPlayerSingle"></h2>
      <div class="single-card-wrap">
        <div class="flip-card" id="singleCard">
          <div class="flip-inner">
            <div class="flip-front">🎵</div>
            <div class="flip-back" id="cardBack"></div>
          </div>
        </div>
      </div>
      <div class="actions">
        <button class="btn btn-secondary" id="nextSongBtn" style="display:none;">Altra</button>
        <button class="btn btn-success" id="selectSongBtn" style="display:none;">Seleziona</button>
        <button class="btn btn-outline" onclick="backToModeSelection()">Indietro</button>
      </div>
    </section>

    <!-- FIVE CARDS -->
    <section class="section" id="fiveCardsSection" style="display: none;">
      <h2 id="currentPlayerFive"></h2>
      <div class="cards-row" id="cardsGrid"></div>
      <div class="actions">
        <button class="btn btn-secondary" id="proposeMoreBtn" style="display:none;">Altre 5</button>
        <button class="btn btn-outline" onclick="backToModeSelection()">Indietro</button>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
