<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Karaoke Wheel</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>🎤 Karaoke Wheel</h1>

    <!-- INPUT SECTION -->
    <div class="input-section">
      <div class="input-group">
        <input type="text" id="nameInput" placeholder="Nome partecipante..." maxlength="20">
        <button class="btn" id="addNameBtn">Aggiungi</button>
      </div>
      
      <div class="participants-tags" id="participantsList"></div>
    </div>

    <!-- SONG MODE SELECTOR -->
    <div class="input-section">
      <h3 style="margin-bottom: 15px; font-weight: 500;">📝 Modalità Inserimento Canzoni</h3>
      
      <div class="mode-selector">
        <button class="mode-btn active" id="csvModeBtn" onclick="setSongMode('csv')">📁 CSV</button>
        <button class="mode-btn" id="manualModeBtn" onclick="setSongMode('manual')">✍️ Manuale</button>
      </div>

      <!-- CSV MODE -->
      <div id="csvModeSection">
        <div class="file-input-wrapper" style="margin-top: 15px;">
          <label for="csvFile" class="file-label">📁 Carica file CSV</label>
          <input type="file" id="csvFile" accept=".csv">
          <span id="csvSongsLoaded" style="margin-left: 15px; color: #999; font-size: 13px;"></span>
        </div>
      </div>

      <!-- MANUAL MODE -->
      <div id="manualModeSection" style="display: none;">
        <div class="input-group" style="margin-top: 15px;">
          <input type="text" id="songInput" placeholder="Titolo canzone..." maxlength="50">
          <button class="btn" id="addSongBtn">Aggiungi</button>
        </div>
        <div class="participants-tags" id="manualSongsList"></div>
      </div>
    </div>

    <!-- STATS -->
    <div class="stats">
      <div class="stat-item">
        <div class="stat-value" id="totalParts">0</div>
        <div class="stat-label">Partecipanti</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="totalSongs">0</div>
        <div class="stat-label">Canzoni</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="availableParts">0</div>
        <div class="stat-label">Disponibili</div>
      </div>
    </div>

    <!-- WHEEL SECTION -->
    <div class="wheel-container">
      <div class="wheel-wrapper">
        <svg id="wheelSvg" viewBox="0 0 400 400"></svg>
        <div class="arrow"></div>
      </div>
      <div style="margin-top: 20px;">
        <button class="btn" id="spinBtn" disabled>Gira la Ruota</button>
        <button class="btn btn-success" id="showSongsBtn" style="display:none; margin-left: 10px;">🎵 Vedi Canzone</button>
        <button class="btn btn-reset" id="resetBtn" style="margin-left: 10px;">🔄 Reset</button>
      </div>
    </div>

    <!-- SINGLE CARD SECTION -->
    <div class="cards-section" id="cardsSection">
      <h2 class="cards-title" id="currentPlayer"></h2>
      
      <div class="single-card-container">
        <div class="card" id="singleCard">
          <div class="card-inner">
            <div class="card-face card-front">🎵</div>
            <div class="card-face card-back" id="cardBack"></div>
          </div>
        </div>
      </div>

      <div class="card-controls" style="margin-top: 30px;">
        <button class="btn btn-purple" id="nextSongBtn" style="display:none;">🎲 Altra Canzone</button>
        <button class="btn btn-success" id="selectSongBtn" style="display:none;">✅ Seleziona</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
